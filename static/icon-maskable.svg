<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="FOMO Berlin">
  <defs>
    <linearGradient id="gm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2854EF"/>
      <stop offset="0.6" stop-color="#884CDA"/>
      <stop offset="1" stop-color="#c25cf0"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so the OS can crop to any shape -->
  <rect width="512" height="512" fill="#0e0a26"/>
  <!-- artwork constrained to the ~80% safe zone -->
  <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
    <rect x="96" y="96" width="320" height="320" rx="72" fill="url(#gm)"/>
    <g fill="#ffffff">
      <rect x="190" y="168" width="50" height="190" rx="9"/>
      <rect x="190" y="168" width="150" height="50" rx="9"/>
      <rect x="190" y="246" width="120" height="48" rx="9"/>
    </g>
  </g>
</svg>
