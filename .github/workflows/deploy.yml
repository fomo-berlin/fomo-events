name: Build & Deploy FOMO Event Calendar

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  # Pulls live from Notion every 30 minutes so new events auto-publish.
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      # DEFAULT: build live from the Notion database.
      # Requires repo secrets NOTION_API_KEY and NOTION_DATABASE_ID.
      - name: Build site (from Notion)
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: npm run build:notion

      # FALLBACK: build from the committed data file instead of Notion.
      # Comment out the step above and uncomment this one.
      # - name: Build site (from local data)
      #   run: npm run build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
